// plugin
def plugin = [:]
plugin.shadow = "com.gradleup.shadow:shadow-gradle-plugin:${versions.shadow}"
plugin.protobuf = "com.google.protobuf:protobuf-gradle-plugin:${versions.protobuf}"
deps.plugin = plugin
// library
deps.bundletool = "com.android.tools.build:bundletool:${versions.bundletool}"
// aabresguard
def aabresguard = [:]
aabresguard.core = "$GROUP_ID:aabresguard-core:${versions["aabresguard"]}"
