// android
versions.compileSdkVersion = 35
versions.minSdkVersion = 24
versions.targetSdkVersion = 35

versions.bundletool = "0.10.0"

versions["aabresguard-core"] = versions.aabresguard
versions["aabresguard-plugin"] = versions.aabresguard

// plugin
versions.shadow = "9.0.0"
versions.protobuf = "0.9.4"
